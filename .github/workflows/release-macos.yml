name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    env:
      ARCH: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build binary
        run: cargo build -p llmime-imk --release --target "$ARCH"

      - name: Package .app bundle
        run: |
          bash scripts/package_macos.sh ${{ github.ref_name }} "$ARCH"

      - name: Verify Info.plist required keys
        run: |
          PLIST=dist/llmime.app/Contents/Info.plist
          plutil -lint "$PLIST"
          for KEY in NSPrincipalClass CFBundleIdentifier CFBundleExecutable \
                     InputMethodConnectionName tsInputModeListKey \
                     tsVisibleInputModeOrderedArrayKey; do
            /usr/libexec/PlistBuddy -c "Print :${KEY}" "$PLIST" || \
              { echo "ERROR: missing key ${KEY}"; exit 1; }
          done
          echo "Info.plist validation passed"

      - name: Verify LS DB not contaminated by dist
        run: |
          LSREG="/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister"
          if [[ -x "$LSREG" ]]; then
            COUNT=$("$LSREG" -dump | grep -c "dist/llmime.app" || true)
            if [[ "$COUNT" -gt 0 ]]; then
              echo "ERROR: dist/llmime.app is still in LS DB ($COUNT entries)"
              exit 1
            fi
            echo "LS DB clean (0 dist entries)"
          else
            echo "WARNING: lsregister not found, skipping LS DB check"
          fi

      # Optional: codesign (requires CODESIGN_IDENTITY secret)
      - name: Codesign (optional)
        if: ${{ env.CODESIGN_IDENTITY != '' }}
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: bash scripts/codesign_macos.sh dist/llmime.app

      - name: Create .zip artifact
        run: |
          cd dist
          zip -r llmime-macos-${{ github.ref_name }}-arm64.zip llmime.app

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/llmime-macos-${{ github.ref_name }}-arm64.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref_name, 'v1.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
